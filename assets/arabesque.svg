<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <pattern id="arabesque" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
      <!-- Eight-pointed star Islamic geometric motif -->
      <g fill="none" stroke="#C8A85B" stroke-width="0.8" opacity="0.35">
        <!-- Outer square rotated 45deg -->
        <rect x="50" y="20" width="42.43" height="42.43" transform="rotate(45 50 50)" />
        <!-- Inner square -->
        <rect x="35" y="35" width="30" height="30" />
        <!-- Cross lines -->
        <line x1="50" y1="10" x2="50" y2="90" />
        <line x1="10" y1="50" x2="90" y2="50" />
        <!-- Diagonal lines -->
        <line x1="20" y1="20" x2="80" y2="80" />
        <line x1="80" y1="20" x2="20" y2="80" />
        <!-- Small center diamond -->
        <rect x="44" y="44" width="12" height="12" transform="rotate(45 50 50)" />
        <!-- Corner decorations -->
        <circle cx="0" cy="0" r="5" />
        <circle cx="100" cy="0" r="5" />
        <circle cx="0" cy="100" r="5" />
        <circle cx="100" cy="100" r="5" />
        <!-- Mid-edge decorations -->
        <circle cx="50" cy="0" r="3" />
        <circle cx="50" cy="100" r="3" />
        <circle cx="0" cy="50" r="3" />
        <circle cx="100" cy="50" r="3" />
        <!-- Petals -->
        <path d="M50,30 Q60,40 50,50 Q40,40 50,30Z" />
        <path d="M70,50 Q60,60 50,50 Q60,40 70,50Z" />
        <path d="M50,70 Q40,60 50,50 Q60,60 50,70Z" />
        <path d="M30,50 Q40,40 50,50 Q40,60 30,50Z" />
      </g>
    </pattern>
  </defs>
  <rect width="400" height="400" fill="url(#arabesque)" />
</svg>
